# Render Blueprint for the Flask JSON API (v2.3). Free web service tier.
# Deploy: connect this repo in the Render dashboard and it reads this file
# automatically ("New +" -> "Blueprint"). Secrets (ANTHROPIC_API_KEY,
# GITHUB_TOKEN) are NOT listed here — set them in the Render dashboard's
# environment tab after the first deploy; never commit them.
services:
  - type: web
    name: resume-assistant-api
    runtime: python
    plan: free
    buildCommand: pip install -e ".[deploy]"
    # gunicorn's default 30s request timeout is too short for /api/analyze:
    # grading claims against repo evidence makes several Anthropic calls, and
    # Render's free tier (0.1 CPU) is slow enough that this routinely exceeds
    # 30s, so gunicorn SIGKILLs the worker mid-request (a real 500 in prod).
    startCommand: gunicorn --timeout 120 "resume_assistant.web.app:create_app()"
    envVars:
      - key: ANTHROPIC_MODEL
        value: claude-sonnet-5
      - key: FRONTEND_ORIGIN
        sync: false # set to the deployed Vercel URL after the frontend is live
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: GITHUB_TOKEN
        sync: false
