<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{% block title %}GitHub Resume Assistant{% endblock %}</title>
<link rel="stylesheet" href="{{ url_for('static', filename='app.css') }}">
</head>
<body>
<div class="app">
  <div class="top">
    <a class="brand" href="{{ url_for('index') }}"><span class="rxmark">&#8478;</span> Resume&nbsp;&times;&nbsp;GitHub</a>
    {% block topbar %}{% endblock %}
  </div>
  {% block content %}{% endblock %}
</div>

<button class="themetoggle" id="themeToggle" type="button">Toggle theme</button>
<script src="{{ url_for('static', filename='app.js') }}"></script>
</body>
</html>
